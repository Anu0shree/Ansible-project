---
- name: Need to create ec2 instances 
  hosts: localhost
  connection: local
  tasks:
    - name: Create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item.name }}"
        key_name: devops
        region: us-east-1
        instance_type: t3.micro
        security_group: default
        aws_access_key: "{{ ec2_access_key }}"
        aws_secret_key: "{{ ec2_secret_key }}"
        network:
          assign_public_id: true
        image_id: "{{ item.image }}"
      loop:
        - { image: "ami-0521cb2d60cfbb1a6", name: "ec2-instance-1" }
        - { image: "ami-0b6d9d3d33ba97d99", name: "ec2-instance-2" }
        - { image: "ami-0b6d9d3d33ba97d99", name: "ec2-instance-3" }